<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Details Form</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .form-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #495057;
            font-weight: bold;
        }
        .optional-text {
            color: #868e96;
            font-size: 0.85em;
            font-weight: normal;
        }
        .input-group input, 
        .input-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: #fdfdfd;
        }
        .input-group input:focus, 
        .input-group select:focus {
            border-color: #80bdff;
            outline: none;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.25);
        }
        .btn {
            width: 100%;
            padding: 14px;
            background-color: #28a745;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .btn:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Enter Your Details</h2>
    
    <form action="https://api.web3forms.com/submit" method="POST">

        <input type="hidden" name="access_key" value="be9c763a-6341-4ee6-8431-9b54cd2aa804">

        <div class="input-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="Name" placeholder="Enter your full name" required>
        </div>
        
        <div class="input-group">
            <label for="email">Email address</label>
            <input type="email" id="email" name="Email" placeholder="example@gmail.com" required>
        </div>

        <div class="input-group">
            <label for="phone">Phone number <span class="optional-text">(Optional)</span></label>
            <input type="tel" id="phone" name="Phone_Number" placeholder="Enter phone number">
        </div>

        <div class="input-group">
            <label for="gender">Gender</label>
            <select id="gender" name="Gender" required>
                <option value="" disabled selected>Select your gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
                <option value="prefer_not_to_say">Prefer not to say</option>
            </select>
        </div>

        <div class="input-group">
            <label for="bodyCount">Body count</label>
            <input type="number" id="bodyCount" name="Body_Count" min="0" placeholder="Enter number" required>
        </div>

        <button type="submit" class="btn">Submit Details</button>
        
    </form>
</div>

</body>
</html>
