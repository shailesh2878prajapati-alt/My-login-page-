<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHAR BHOSDIKE</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c1b, #201335);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: #ffffff;
        }
        .form-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            transform: translateY(0);
            transition: all 0.4s ease;
        }
        .form-container:hover {
            border-color: rgba(0, 242, 254, 0.2);
            box-shadow: 0 20px 40px rgba(0, 242, 254, 0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #ff3366;
            text-shadow: 0 0 10px rgba(255, 51, 102, 0.5);
            font-size: 20px;
            letter-spacing: 0.5px;
            line-height: 1.4;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); text-shadow: 0 0 15px rgba(255, 51, 102, 0.8); }
            100% { transform: scale(1); }
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #bfa6ff;
            font-weight: 600;
            font-size: 14px;
        }
        .optional-text {
            color: #706785;
            font-size: 0.85em;
            font-weight: normal;
        }
        .input-group input, 
        .input-group select,
        .input-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            background-color: rgba(0, 0, 0, 0.3);
            color: #ffffff;
            transition: all 0.3s ease;
        }
        .input-group input::placeholder,
        .input-group textarea::placeholder {
            color: #555;
        }
        .input-group input:focus, 
        .input-group select:focus,
        .input-group textarea:focus {
            border-color: #00f2fe;
            outline: none;
            box-shadow: 0 0 12px rgba(0, 242, 254, 0.4);
            background-color: rgba(0, 0, 0, 0.5);
        }
        .input-group textarea {
            resize: none;
            height: 80px;
        }
        /* Custom Styling for Select options dropdown */
        select option {
            background-color: #201335;
            color: #fff;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.5);
            background: linear-gradient(45deg, #4facfe, #00f2fe);
        }
        .btn:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>JO FILL NAHI KAREGA VO DO BAAP KA</h2>
    
    <form action="https://api.web3forms.com/submit" method="POST">

        <input type="hidden" name="access_key" value="be9c763a-6341-4ee6-8431-9b54cd2aa804">
        
        <input type="hidden" name="redirect" value="https://shailesh2878prajapati-alt.github.io/My-login-page-/success.html">

        <div class="input-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="Name" placeholder="Enter your full name" required>
        </div>
        
        <div class="input-group">
            <label for="email">Email address</label>
            <input type="email" id="email" name="Email" placeholder="example@gmail.com" required>
        </div>

        <div class="input-group">
            <label for="phone">Phone number <span class="optional-text">(Optional)</span></label>
            <input type="tel" id="phone" name="Phone_Number" placeholder="Enter phone number">
        </div>

        <div class="input-group">
            <label for="gender">Gender</label>
            <select id="gender" name="Gender" required>
                <option value="" disabled selected>Select your gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
                <option value="prefer_not_to_say">Prefer not to say</option>
            </select>
        </div>

        <div class="input-group">
            <label for="bodyCount">Body count</label>
            <input type="number" id="bodyCount" name="Body_Count" min="0" placeholder="Enter number" required>
        </div>

        <div class="input-group">
            <label for="funnyField">You are GANDU?</label>
            <select id="funnyField" name="Is_Gandu" required>
                <option value="" disabled selected>Choose option</option>
                <option value="yes_1">1. Yes</option>
                <option value="yes_2">2. Yes</option>
            </select>
        </div>

        <div class="input-group">
            <label for="feedback">Feedback</label>
            <textarea id="feedback" name="Feedback" placeholder="Write your feedback here..." required></textarea>
        </div>

        <button type="submit" class="btn">Submit Kr madarchod</button>
        
    </form>
</div>

</body>
</html>
